version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: authserviceBanco_postgres
    restart: always
    environment:
      POSTGRES_DB: SistemaBancario
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
    ports:
     - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: sistemaBancario_mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: SistemaBancario
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
