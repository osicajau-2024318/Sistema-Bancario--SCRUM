version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: authserviceBanco_postgres
    restart: always
    environment:
      POSTGRES_DB: SistemaBancario
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
    ports:
     - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgressql/data

volumes:
  postgres_data:
